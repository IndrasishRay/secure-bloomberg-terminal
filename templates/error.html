<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERROR - SECURE BLOOMBERG TERMINAL</title>
  <link rel="stylesheet" href="/static/css/bloomberg.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh">
  <div style="text-align:center;max-width:500px;padding:32px">
    <div style="font-size:64px;color:var(--red);margin-bottom:16px;font-weight:bold">!</div>
    <div style="font-size:28px;color:var(--amber);letter-spacing:4px;text-transform:uppercase;margin-bottom:8px">
      ERROR <span id="error-code">404</span>
    </div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:24px;line-height:1.6" id="error-message">
      The requested resource was not found.
    </div>
    <div style="margin-bottom:24px">
      <span class="blink-indicator" style="display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;animation:blink 1s infinite;margin-right:4px;vertical-align:middle"></span>
      <span style="color:var(--text-dim);font-size:11px">TERMINAL CONNECTION INTERRUPTED</span>
    </div>
    <a href="/" class="btn btn-amber" style="display:inline-block;padding:8px 24px;text-decoration:none">
      ◄ RETURN TO TERMINAL
    </a>
    <div style="margin-top:32px;font-size:10px;color:var(--text-dim);letter-spacing:1px">
      SECURE BLOOMBERG TERMINAL v3.2
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '404';
    const msg = params.get('message') || 'The requested resource was not found.';
    document.getElementById('error-code').textContent = code;
    document.getElementById('error-message').textContent = msg;
  </script>
</body>
</html>
